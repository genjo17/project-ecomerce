<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 560" role="img" aria-labelledby="title desc">
  <title id="title">Panel katalog SABISHOP</title>
  <desc id="desc">Panel biru tua dengan empat kartu fitur, menampilkan produk lengkap, kategori jelas, mudah dibayar, dan produk pilihan.</desc>
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#091126" flood-opacity=".18"/>
    </filter>

    <symbol id="icon-box" viewBox="0 0 80 80">
      <polygon points="40,8 70,25 40,42 10,25" fill="#f1d7a8"/>
      <polygon points="10,25 40,42 40,72 10,55" fill="#d3a15d"/>
      <polygon points="70,25 40,42 40,72 70,55" fill="#b98040"/>
      <polygon points="40,8 70,25 40,42 10,25" fill="#fff3d9" opacity=".35"/>
      <path d="M24 28l16 9 16-9" fill="none" stroke="#9a642d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity=".45"/>
    </symbol>

    <symbol id="icon-tag" viewBox="0 0 80 80">
      <path d="M18 18h24c2 0 4 1 5 2l18 18c2 2 2 5 0 7L41 69c-2 2-5 2-7 0L17 52c-1-1-2-3-2-5V26c0-4 3-8 8-8z" fill="#f3dcc0"/>
      <circle cx="29" cy="29" r="4.5" fill="#1d3276"/>
      <path d="M20 44l24-24" stroke="#c59b5e" stroke-width="3" stroke-linecap="round" opacity=".35"/>
    </symbol>

    <symbol id="icon-card" viewBox="0 0 80 80">
      <rect x="10" y="18" width="60" height="40" rx="9" fill="#78a1ff"/>
      <rect x="10" y="18" width="60" height="12" rx="9" fill="#5e86eb"/>
      <rect x="18" y="34" width="16" height="10" rx="3" fill="#ffdd79"/>
      <circle cx="46" cy="42" r="5" fill="#ff8a6c"/>
      <circle cx="58" cy="42" r="5" fill="#9ad2ff"/>
    </symbol>

    <symbol id="icon-star" viewBox="0 0 80 80">
      <path d="M40 9l8 18 20 3-14 13 3 20-17-9-17 9 3-20-14-13 20-3z" fill="#ffd64f"/>
      <path d="M40 13l6 14 16 3-11 11 3 16-14-8-14 8 3-16-11-11 16-3z" fill="#fff4a3" opacity=".28"/>
    </symbol>
  </defs>

  <rect width="1024" height="560" rx="34" fill="#1a2a67"/>
  <rect x="18" y="18" width="988" height="524" rx="30" fill="#1d3175"/>
  <circle cx="930" cy="78" r="88" fill="#d9e3ff" opacity=".08"/>
  <circle cx="972" cy="50" r="20" fill="#ffffff" opacity=".05"/>

  <rect x="46" y="42" width="206" height="34" rx="17" fill="#37508f" opacity=".94"/>
  <text x="64" y="64" fill="#dce7ff" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="3">KATALOG SABISHOP</text>

  <g filter="url(#cardShadow)">
    <rect x="46" y="96" width="454" height="158" rx="28" fill="#394d86"/>
    <rect x="524" y="96" width="454" height="158" rx="28" fill="#394d86"/>
    <rect x="46" y="276" width="454" height="158" rx="28" fill="#394d86"/>
    <rect x="524" y="276" width="454" height="158" rx="28" fill="#394d86"/>
  </g>

  <!-- Card 1 -->
  <use href="#icon-box" x="64" y="118" width="36" height="36"/>
  <use href="#icon-box" x="390" y="126" width="78" height="78" opacity=".98"/>
  <text x="64" y="177" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800">Produk Lengkap</text>
  <text x="64" y="213" fill="#e1e8ff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="400">Banyak pilihan.</text>

  <!-- Card 2 -->
  <use href="#icon-tag" x="542" y="118" width="36" height="36"/>
  <use href="#icon-tag" x="856" y="122" width="84" height="84" opacity=".98"/>
  <text x="542" y="177" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800">Kategori Jelas</text>
  <text x="542" y="213" fill="#e1e8ff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="400">Mudah dicari.</text>

  <!-- Card 3 -->
  <use href="#icon-card" x="64" y="300" width="36" height="36"/>
  <use href="#icon-card" x="380" y="310" width="84" height="84" opacity=".98" transform="rotate(-9 422 352)"/>
  <text x="64" y="359" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800">Mudah Dibayar</text>
  <text x="64" y="395" fill="#e1e8ff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="400">Transaksi praktis.</text>

  <!-- Card 4 -->
  <use href="#icon-star" x="542" y="300" width="36" height="36"/>
  <use href="#icon-star" x="855" y="306" width="88" height="88" opacity=".98"/>
  <text x="542" y="359" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800">Produk Pilihan</text>
  <text x="542" y="395" fill="#e1e8ff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="400">Kualitas terbaik.</text>
</svg>
